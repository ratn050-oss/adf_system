<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Narayana Resto</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @page { size: A4 portrait; margin: 0; }
        @media print {
            html, body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .form-panel, .btn-bar { display: none !important; }
            .a4-page {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 18mm 22mm !important;
                box-shadow: none !important;
                page-break-after: always;
                page-break-inside: avoid;
                overflow: hidden !important;
            }
            .a4-page:last-of-type {
                page-break-after: auto;
            }
            .page-break {
                page-break-before: always;
            }
        }

        :root {
            --gold: #C9A84C;
            --gold-light: #E8D5A3;
            --gold-dim: rgba(201,168,76,0.15);
            --dark: #0D0D0D;
            --surface: #151515;
            --text: #D8D8D8;
            --text-dim: #8A8A8A;
            --body-bg: #080808;
            --border-outer: var(--gold);
            --border-inner: var(--gold);
            --corner-color: var(--gold);
            --menu-title-color: #FFFFFF;
            --leader-color: #333;
            --footer-color: #555;
            --heading-line-color: var(--gold);
            --form-bg: #1a1a1a;
            --form-border: #333;
            --form-item-bg: #111;
            --form-input-bg: #0d0d0d;
            --form-btn-color: #666;
            --form-hover-border: #444;
        }

        body.theme-light {
            --gold: #8B6914;
            --gold-light: #A67C00;
            --gold-dim: rgba(139,105,20,0.1);
            --surface: #FDF8EF;
            --text: #3D2B1F;
            --text-dim: #7A6B5D;
            --body-bg: #E8E0D4;
            --border-outer: #C9A84C;
            --border-inner: #C9A84C;
            --corner-color: #C9A84C;
            --menu-title-color: #2C1810;
            --leader-color: #D4C5A9;
            --footer-color: #A0937D;
            --heading-line-color: #C9A84C;
            --form-bg: #F0E8DA;
            --form-border: #D4C5A9;
            --form-item-bg: #FDF8EF;
            --form-input-bg: #FFFFFF;
            --form-btn-color: #A0937D;
            --form-hover-border: #C9A84C;
        }

        body.theme-navy {
            --gold: #B8860B;
            --gold-light: #DAA520;
            --gold-dim: rgba(184,134,11,0.12);
            --surface: #0A1628;
            --text: #C8D6E5;
            --text-dim: #6B7F99;
            --body-bg: #050D1A;
            --border-outer: #B8860B;
            --border-inner: #B8860B;
            --corner-color: #B8860B;
            --menu-title-color: #E8EEF5;
            --leader-color: #1E3050;
            --footer-color: #4A5F7A;
            --heading-line-color: #B8860B;
            --form-bg: #0D1B33;
            --form-border: #1E3050;
            --form-item-bg: #0A1628;
            --form-input-bg: #070F20;
            --form-btn-color: #6B7F99;
            --form-hover-border: #B8860B;
        }

        body.theme-emerald {
            --gold: #2D8B56;
            --gold-light: #5CB383;
            --gold-dim: rgba(45,139,86,0.1);
            --surface: #FAFDF7;
            --text: #1A3C2A;
            --text-dim: #5A7D68;
            --body-bg: #E4EDE6;
            --border-outer: #2D8B56;
            --border-inner: #2D8B56;
            --corner-color: #2D8B56;
            --menu-title-color: #0F2918;
            --leader-color: #C4D9CC;
            --footer-color: #7A9D88;
            --heading-line-color: #2D8B56;
            --form-bg: #E8F0EA;
            --form-border: #C4D9CC;
            --form-item-bg: #F5FAF7;
            --form-input-bg: #FFFFFF;
            --form-btn-color: #5A7D68;
            --form-hover-border: #2D8B56;
        }

        body.theme-rose {
            --gold: #9B2D4E;
            --gold-light: #C75B7A;
            --gold-dim: rgba(155,45,78,0.08);
            --surface: #FFF8F6;
            --text: #3D1F2B;
            --text-dim: #8A6070;
            --body-bg: #F0E0E4;
            --border-outer: #9B2D4E;
            --border-inner: #9B2D4E;
            --corner-color: #9B2D4E;
            --menu-title-color: #2C0F1A;
            --leader-color: #E8C5CF;
            --footer-color: #A0808D;
            --heading-line-color: #9B2D4E;
            --form-bg: #F5E5E9;
            --form-border: #E8C5CF;
            --form-item-bg: #FFF5F3;
            --form-input-bg: #FFFFFF;
            --form-btn-color: #8A6070;
            --form-hover-border: #9B2D4E;
        }

        body.theme-marble {
            --gold: #666666;
            --gold-light: #999999;
            --gold-dim: rgba(102,102,102,0.08);
            --surface: #FFFFFF;
            --text: #2D2D2D;
            --text-dim: #777777;
            --body-bg: #E0E0E0;
            --border-outer: #AAAAAA;
            --border-inner: #AAAAAA;
            --corner-color: #AAAAAA;
            --menu-title-color: #111111;
            --leader-color: #D5D5D5;
            --footer-color: #999999;
            --heading-line-color: #AAAAAA;
            --form-bg: #F0F0F0;
            --form-border: #D5D5D5;
            --form-item-bg: #FFFFFF;
            --form-input-bg: #FAFAFA;
            --form-btn-color: #999999;
            --form-hover-border: #AAAAAA;
        }

        body.theme-ocean {
            --gold: #C8A951;
            --gold-light: #E0C97A;
            --gold-dim: rgba(200,169,81,0.12);
            --dark: #091B2A;
            --surface: #0B2138;
            --text: #D4E4F1;
            --text-dim: #7A9BB8;
            --body-bg: #061420;
            --border-outer: #C8A951;
            --border-inner: #C8A951;
            --corner-color: #C8A951;
            --menu-title-color: #EAF2F8;
            --leader-color: #163A55;
            --footer-color: #537D9B;
            --heading-line-color: #C8A951;
            --form-bg: #0D2540;
            --form-border: #163A55;
            --form-item-bg: #0B2138;
            --form-input-bg: #081A2C;
            --form-btn-color: #7A9BB8;
            --form-hover-border: #C8A951;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--body-bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== FORM PANEL ========== */
        .form-panel {
            width: 210mm;
            background: var(--form-bg);
            border: 1px solid var(--form-border);
            border-radius: 16px;
            margin: 30px 0 20px;
            padding: 30px;
        }
        .form-panel h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
        }
        .form-panel .form-sub {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 24px;
        }
        .form-section {
            margin-bottom: 20px;
        }
        .form-section-title {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--form-border);
            padding-bottom: 6px;
            margin-bottom: 12px;
        }

        /* Enhanced form item */
        .form-item {
            background: var(--form-item-bg);
            border: 1px solid var(--form-border);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .form-item:hover { border-color: var(--form-hover-border); }
        .form-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-item-name {
            flex: 1;
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .form-item-price {
            width: 130px;
            padding: 7px 10px;
            border: 1px solid var(--form-border);
            border-radius: 6px;
            background: var(--form-input-bg);
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-align: right;
            outline: none;
            transition: border-color 0.2s;
            flex-shrink: 0;
        }
        .form-item-price:focus { border-color: var(--gold); }
        .form-item-price::placeholder { color: var(--form-btn-color); font-weight: 400; }
        .form-item-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid var(--form-border);
            background: transparent;
            color: var(--form-btn-color);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .form-item-btn:hover { border-color: var(--gold); color: var(--gold); }
        .form-item-btn.btn-del:hover { border-color: #e74c3c; color: #e74c3c; }
        .form-item-btn.btn-move:hover { border-color: #3b82f6; color: #3b82f6; }
        .form-item-btn.btn-move[disabled] { opacity: 0.2; pointer-events: none; }
        .move-group { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
        .move-group .form-item-btn { width: 26px; height: 18px; font-size: 10px; border-radius: 4px; }
        .form-item-detail {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--form-border);
        }
        .form-item-detail.open { display: block; }
        .form-item-detail label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }
        .form-item-detail input,
        .form-item-detail textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--form-border);
            border-radius: 6px;
            background: var(--form-input-bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            outline: none;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .form-item-detail textarea {
            resize: vertical;
            min-height: 60px;
            line-height: 1.6;
        }
        .form-item-detail input:focus,
        .form-item-detail textarea:focus { border-color: var(--gold); }
        .btn-add-item {
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--form-hover-border);
            border-radius: 8px;
            background: transparent;
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .btn-add-item:hover { border-color: var(--gold); background: var(--gold-dim); }

        .btn-bar {
            width: 210mm;
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #a8893a);
            color: var(--surface);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--gold-dim); }
        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }
        .btn-outline:hover { background: var(--gold-dim); }
        .btn-reset {
            background: transparent;
            color: var(--form-btn-color);
            border: 1px solid var(--form-border);
        }
        .btn-reset:hover { border-color: #e74c3c; color: #e74c3c; }

        /* ========== MENU PAGES ========== */
        .a4-page {
            width: 210mm;
            height: 296mm;
            background: var(--surface);
            padding: 18mm 22mm;
            position: relative;
            box-shadow: 0 4px 40px rgba(0,0,0,0.6);
            margin: 10px 0;
            overflow: hidden;
        }

        .a4-page::before {
            content: "";
            position: absolute;
            top: 8mm; left: 8mm; right: 8mm; bottom: 8mm;
            border: 0.5px solid var(--border-outer);
            opacity: 0.25;
            pointer-events: none;
        }
        .a4-page::after {
            content: "";
            position: absolute;
            top: 10mm; left: 10mm; right: 10mm; bottom: 10mm;
            border: 0.5px solid var(--border-inner);
            opacity: 0.12;
            pointer-events: none;
        }

        .corner { position: absolute; width: 30px; height: 30px; opacity: 0.35; }
        .corner::before, .corner::after { content: ""; position: absolute; background: var(--corner-color); }
        .corner-tl { top: 9mm; left: 9mm; }
        .corner-tl::before { width: 20px; height: 1px; top: 0; left: 0; }
        .corner-tl::after { width: 1px; height: 20px; top: 0; left: 0; }
        .corner-tr { top: 9mm; right: 9mm; }
        .corner-tr::before { width: 20px; height: 1px; top: 0; right: 0; }
        .corner-tr::after { width: 1px; height: 20px; top: 0; right: 0; }
        .corner-bl { bottom: 9mm; left: 9mm; }
        .corner-bl::before { width: 20px; height: 1px; bottom: 0; left: 0; }
        .corner-bl::after { width: 1px; height: 20px; bottom: 0; left: 0; }
        .corner-br { bottom: 9mm; right: 9mm; }
        .corner-br::before { width: 20px; height: 1px; bottom: 0; right: 0; }
        .corner-br::after { width: 1px; height: 20px; bottom: 0; right: 0; }

        .logo-title {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            text-align: center;
            font-size: 34pt;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .logo-divider {
            width: 80px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 6px;
            opacity: 0.5;
        }
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--text-dim);
            text-align: center;
            font-size: 11pt;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }

        .section-heading {
            text-align: center;
            margin: 28px 0 18px;
            position: relative;
        }
        .section-heading::before {
            content: "";
            position: absolute;
            left: 0; right: 0; top: 50%;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), var(--heading-line-color), var(--gold-dim), transparent);
        }
        .section-heading span {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 13pt;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: var(--surface);
            padding: 0 20px;
            position: relative;
        }

        .sub-category {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold-light);
            text-align: center;
            font-size: 10.5pt;
            font-style: italic;
            margin: 16px 0 12px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .menu-item { margin-bottom: 14px; }
        .menu-header {
            display: flex;
            align-items: baseline;
            gap: 0;
            margin-bottom: 3px;
        }
        .menu-title {
            font-weight: 500;
            font-size: 10.5pt;
            color: var(--gold) !important;
            letter-spacing: 0.3px;
        }
        .leader {
            flex: 1;
            border-bottom: 1px dotted var(--leader-color);
            margin: 0 10px;
            position: relative;
            top: -3px;
        }
        .menu-price {
            font-weight: 600;
            font-size: 10.5pt;
            color: var(--gold) !important;
            white-space: nowrap;
        }

        .menu-desc {
            font-size: 8.5pt;
            color: var(--text-dim);
            font-weight: 300;
            line-height: 1.5;
            padding-left: 0;
            max-width: 88%;
        }
        .menu-list {
            font-size: 8.5pt;
            color: var(--text-dim);
            font-weight: 300;
            margin: 3px 0 0 18px;
            padding: 0;
            line-height: 1.5;
        }

        .page-footer {
            position: absolute;
            bottom: 14mm;
            left: 0; right: 0;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 8pt;
            color: var(--footer-color);
            letter-spacing: 2px;
        }

        /* Theme selector */
        .theme-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        .theme-card {
            border: 2px solid var(--form-border);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            position: relative;
        }
        .theme-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .theme-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
        .theme-card.selected::after {
            content: '\2713';
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            background: var(--gold);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .theme-preview {
            width: 100%;
            height: 50px;
            border-radius: 6px;
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
        }
        .theme-preview-line {
            position: absolute;
            height: 2px;
            border-radius: 1px;
        }
        .theme-card-name {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- ==================== FORM EDITOR ==================== -->
    <div class="form-panel" id="formPanel">
        <!-- Dynamically rendered by JavaScript -->
    </div>

    <div class="btn-bar">
        <button class="btn btn-gold" onclick="updateMenu()">&#10003; Update Menu</button>
        <button class="btn btn-outline" onclick="window.print()">&#128438; Print / Save PDF</button>
        <button class="btn btn-reset" onclick="resetMenu()">&#8634; Reset Default</button>
    </div>

    <!-- ==================== PAGE 1 ==================== -->
    <div class="a4-page" id="page1">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div id="menuLogo" style="text-align:center;margin-bottom:10px;display:none;">
            <img id="menuLogoImg" src="" alt="Logo" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold);opacity:0.8;">
        </div>

        <div class="logo-title">Narayana</div>
        <div class="logo-divider"></div>
        <div class="tagline">A Culinary Journey by the Sea</div>

        <div id="page1Content"></div>

        <div class="page-footer">NARAYANA RESTO &nbsp;&bull;&nbsp; KARIMUNJAWA</div>
    </div>

    <!-- ==================== PAGE 2 ==================== -->
    <div class="a4-page page-break" id="page2">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div id="page2Content"></div>

        <div class="page-footer">NARAYANA RESTO &nbsp;&bull;&nbsp; KARIMUNJAWA</div>
    </div>

    <!-- ==================== PAGE 3 (Drinks 1) ==================== -->
    <div class="a4-page page-break" id="page3">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="section-heading" style="margin-top:8px;"><span>Beverages</span></div>

        <div id="page3Content"></div>

        <div class="page-footer">NARAYANA RESTO &nbsp;&bull;&nbsp; KARIMUNJAWA</div>
    </div>

    <!-- ==================== PAGE 4 (Drinks 2) ==================== -->
    <div class="a4-page page-break" id="page4">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div id="page4Content"></div>

        <div class="page-footer">NARAYANA RESTO &nbsp;&bull;&nbsp; KARIMUNJAWA</div>
    </div>

    <!-- ==================== PAGE 5 (Drinks 3) ==================== -->
    <div class="a4-page page-break" id="page5">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div id="page5Content"></div>

        <div id="taxNotice" style="margin-top:28px; text-align:center; padding-top:16px; border-top:0.5px solid var(--heading-line-color); opacity:0.9;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:9pt; color:var(--text-dim); letter-spacing:0.5px; line-height:1.6; margin:0;">
                Harga yang tertera belum termasuk Pajak Pemerintah 11% &amp; Service Charge 5%.

    // ==================== UTILITY ====================
    function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function formatRp(val) {
        var num = String(val).replace(/[^0-9]/g, '');
        if (!num) return '';
        return 'Rp ' + parseInt(num).toLocaleString('id-ID');
    }

    function parseDesc(desc) {
        if (!desc) return { text: '', list: [] };
        var lines = desc.split('\n');
        var text = [];
        var list = [];
        lines.forEach(function(l) {
            l = l.trim();
            if (l.indexOf('- ') === 0) list.push(l.substring(2));
            else if (l) text.push(l);
        });
        return { text: text.join(' '), list: list };
    }

    function deepClone(obj) {
        return JSON.parse(JSON.stringify(obj));
    }

    // ==================== DATA MANAGEMENT ====================
    function loadData() {
        // Load tax message
        taxMessage = localStorage.getItem('narayana_menu_tax') || 'Harga yang tertera belum termasuk Pajak Pemerintah 11% & Service Charge 5%.';
        try {
            var saved = localStorage.getItem('narayana_menu_data_v2');
            if (saved) {
                menuData = JSON.parse(saved);
                // Merge any new default sections not yet in saved data
                var existingIds = {};
                menuData.forEach(function(s) { existingIds[s.id] = true; });
                DEFAULT_MENU.forEach(function(ds) {
                    if (!existingIds[ds.id]) menuData.push(deepClone(ds));
                });
                // Sync page assignments from DEFAULT_MENU
                var pageMap = {};
                DEFAULT_MENU.forEach(function(ds) { pageMap[ds.id] = ds.page; });
                menuData.forEach(function(s) {
                    if (pageMap[s.id] !== undefined) s.page = pageMap[s.id];
                });
                return;
            }
        } catch(e) {}

        // Start from defaults
        menuData = deepClone(DEFAULT_MENU);

        // Migrate old price format if exists
        try {
            var oldPrices = JSON.parse(localStorage.getItem('narayana_menu_prices'));
            if (oldPrices) {
                var idMap = {
                    'appetizer_1':[0,0],'appetizer_2':[0,1],'appetizer_3':[0,2],'appetizer_4':[0,3],'appetizer_5':[0,4],
                    'asian_1':[1,0],'asian_2':[1,1],'asian_3':[1,2],
                    'western_1':[2,0],'western_2':[2,1],'western_3':[2,2],'western_4':[2,3],'western_5':[2,4],
                    'pasta_1':[3,0],'pasta_2':[3,1],'pasta_3':[3,2],'pasta_4':[3,3],
                    'dessert_1':[4,0],'dessert_2':[4,1],'dessert_3':[4,2]
                };
                for (var key in oldPrices) {
                    if (idMap[key] && oldPrices[key]) {
                        var ref = idMap[key];
                        if (menuData[ref[0]] && menuData[ref[0]].items[ref[1]]) {
                            menuData[ref[0]].items[ref[1]].price = oldPrices[key];
                        }
                    }
                }
            }
        } catch(e) {}
    }

    // ==================== RENDER MENU PAGES ====================
    function renderMenu() {
        var pages = { 1: '', 2: '', 3: '', 4: '', 5: '' };

        menuData.forEach(function(sec) {
            var html = '';
            if (sec.heading) {
                html += '<div class="section-heading"><span>' + esc(sec.heading) + '</span></div>';
            }
            if (sec.sub) {
                html += '<div class="sub-category">' + esc(sec.sub) + '</div>';
            }
            sec.items.forEach(function(item) {
                var parsed = parseDesc(item.desc);
                html += '<div class="menu-item">';
                html += '<div class="menu-header">';
                html += '<span class="menu-title">' + esc(item.name) + '</span>';
                html += '<span class="leader"></span>';
                html += '<span class="menu-price">' + (item.price || '...') + '</span>';
                html += '</div>';
                if (parsed.text) {
                    html += '<p class="menu-desc">' + esc(parsed.text) + '</p>';
                }
                if (parsed.list.length > 0) {
                    html += '<ul class="menu-list">';
                    parsed.list.forEach(function(li) {
                        html += '<li>' + esc(li) + '</li>';
                    });
                    html += '</ul>';
                }
                html += '</div>';
            });

            var p = sec.page || 1;
            if (!pages[p]) pages[p] = '';
            pages[p] += html;
        });

        document.getElementById('page1Content').innerHTML = pages[1];
        document.getElementById('page2Content').innerHTML = pages[2];
        document.getElementById('page3Content').innerHTML = pages[3];
        document.getElementById('page4Content').innerHTML = pages[4];
        document.getElementById('page5Content').innerHTML = pages[5];

        // Update tax notice dynamically
        var taxP = document.querySelector('#taxNotice p');
        if (taxP) taxP.textContent = taxMessage;
    }

    // ==================== ACTIONS ====================
    function toggleEdit(si, ii) {
        var detail = document.getElementById('fd-'+si+'-'+ii);
        if (detail) {
            detail.classList.toggle('open');
            if (detail.classList.contains('open')) {
                var nameInput = detail.querySelector('.detail-name');
                if (nameInput) nameInput.focus();
            }
        }
    }

    function addItem(si) {
        collectFormData();
        menuData[si].items.push({ name: 'Menu Baru', desc: '', price: '' });
        saveData();
        renderForm();
        renderMenu();
        // Open edit for the new item and scroll to it
        var ii = menuData[si].items.length - 1;
        toggleEdit(si, ii);
        var el = document.getElementById('fi-'+si+'-'+ii);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function moveItem(si, ii, dir) {
        var newIdx = ii + dir;
        if (newIdx < 0 || newIdx >= menuData[si].items.length) return;
        collectFormData();
        var items = menuData[si].items;
        var temp = items[ii];
        items[ii] = items[newIdx];
        items[newIdx] = temp;
        saveData();
        renderForm();
        renderMenu();
        // Scroll to moved item's new position
        var el = document.getElementById('fi-'+si+'-'+newIdx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function deleteItem(si, ii) {
        var name = menuData[si].items[ii].name;
        if (!confirm('Hapus "' + name + '" dari menu?')) return;
        collectFormData();
        menuData[si].items.splice(ii, 1);
        saveData();
        renderForm();
        renderMenu();
    }

    function updateMenu() {
        collectFormData();
        saveData();
        renderMenu();
        document.getElementById('page1').scrollIntoView({ behavior: 'smooth' });
    }

    function resetMenu() {
        if (!confirm('Reset semua menu ke default? Semua perubahan nama, deskripsi, dan harga akan hilang.')) return;
        localStorage.removeItem('narayana_menu_data_v2');
        menuData = deepClone(DEFAULT_MENU);
        saveData();
        renderForm();
        renderMenu();
    }

    // ==================== EVENT DELEGATION ====================
    document.getElementById('formPanel').addEventListener('input', function(e) {
        // Auto-format Rupiah
        if (e.target.classList.contains('form-item-price')) {
            var raw = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = raw ? formatRp(raw) : '';
        }
        // Sync name to header label
        if (e.target.classList.contains('detail-name')) {
            var si = e.target.dataset.s;
            var ii = e.target.dataset.i;
            var nameSpan = document.getElementById('fn-'+si+'-'+ii);
            if (nameSpan) nameSpan.textContent = e.target.value || 'Menu Baru';
        }
    });

    // ==================== LOGO ====================
    function setupLogoHandlers() {
        var uploadInput = document.getElementById('logoUpload');
        if (uploadInput) {
            uploadInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var dataUrl = ev.target.result;
                    localStorage.setItem('narayana_menu_logo', dataUrl);
                    applyLogo(dataUrl);
                };
                reader.readAsDataURL(file);
            });
        }
        var savedLogo = localStorage.getItem('narayana_menu_logo');
        if (savedLogo) applyLogo(savedLogo);
    }

    function applyLogo(dataUrl) {
        var previewImg = document.getElementById('logoPreviewImg');
        var placeholder = document.getElementById('logoPlaceholder');
        if (previewImg) { previewImg.src = dataUrl; previewImg.style.display = 'block'; }
        if (placeholder) placeholder.style.display = 'none';
        document.getElementById('menuLogoImg').src = dataUrl;
        document.getElementById('menuLogo').style.display = 'block';
    }

    function removeLogo() {
        localStorage.removeItem('narayana_menu_logo');
        var previewImg = document.getElementById('logoPreviewImg');
        var placeholder = document.getElementById('logoPlaceholder');
        if (previewImg) { previewImg.src = ''; previewImg.style.display = 'none'; }
        if (placeholder) placeholder.style.display = 'block';
        document.getElementById('menuLogoImg').src = '';
        document.getElementById('menuLogo').style.display = 'none';
    }

    // ==================== THEME ====================
    var THEME_LIST = ['dark', 'light', 'navy', 'emerald', 'rose', 'marble', 'ocean'];
    var currentTheme = localStorage.getItem('narayana_menu_theme') || 'dark';

    function applyTheme(theme) {
        currentTheme = theme;
        // Remove all theme classes
        THEME_LIST.forEach(function(t) {
            document.body.classList.remove('theme-' + t);
        });
        // Apply new (dark = :root defaults, no class needed)
        if (theme !== 'dark') {
            document.body.classList.add('theme-' + theme);
        }
        localStorage.setItem('narayana_menu_theme', theme);
        // Re-render form to update selected card
        collectFormData();
        renderForm();
    }

    // ==================== INIT ====================
    applyTheme(currentTheme);
    loadData();
    renderForm();
    renderMenu();
    </script>

</body>
</html>
